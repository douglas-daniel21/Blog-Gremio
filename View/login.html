<body>

    <div class="modal-dialog">
        <div class="modal-content rounded-4 shadow">
            <div class="modal-header p-5 pb-4 border-bottom-0">
                <h1 class="fw-bold mb-0 fs-2">Login</h1> 
                <a type="button" href="../header.php" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
            </div>
            <div class="modal-body p-5 pt-0">
                <form action="../Model/"  method="post">
                    <div class="form-floating mb-3"> 
                        <input type="email" name="usuario_email" class="form-control rounded-3" id="floatingInput"
                        placeholder="name@example.com" requered minlength="1">
                        
                        <label for="floatingInput">Endereço Email@example.com</label> 
                    </div>
                    <div class="form-floating mb-3"> 
                        <input type="password" name="usuario_senha" id="senha" class="form-control rounded-3" 
                        placeholder="Digite sua senha">

                        <label>Senha</label>

                        <div>
                            <input type="checkbox" id="checkMostrar" onclick="toggleSenha()">
                            <label for="checkMostrar" style="font-size: 14px; cursor: pointer;">
                                Mostrar senha
                            </label>
                        </div>
                        


                        </button>
                    </div>
                    <script>
                        function toggleSenha() {
                            // Pegamos o input pelo ID
                            const inputSenha = document.getElementById('senha');
                            
                            // Verificamos o tipo atual: se for password, vira text; se for text, vira password
                            if (inputSenha.type === "password") {
                                inputSenha.type = "text";
                            } else {
                                inputSenha.type = "password";
                            }
                        }
                    </script>

                    <div style="text-align: center; padding: 10px; width: 100%" class="container">
