<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Document</title>
</head>

<body>
    <main style="padding: 10px;">
        <div class="card-gremio">
            <div class="card-overlay"></div>
            <div class="card-content">
                <img src="/img/Gremio_logo2.svg" alt="Escudo Grêmio" class="escudo">
                <h2>O Imortal precisa de você!</h2>
                <p>Jogue junto com o Grêmio. Seja sócio, garanta seu lugar na Arena e ajude o Tricolor a ser cada vez mais forte.</p>
                <a href="https://socio.gremio.net/" target="_blank" class="btn-socio">QUERO SER SÓCIO</a>
            </div>
        </div>
        
        <style>
            .card-gremio {
                position: relative;
                width: 100%;
                max-width: 650px;
                height: 500px;
                background: url('/img/torcida-gremio.webp') no-repeat center; /* Substitua por uma foto da Arena */
                background-size: cover;
                border-radius: 15px;
                overflow: hidden;
                display: flex;
                align-items: flex-end;
                box-shadow: 0 10px 20px rgba(0,0,0,0.3);
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 20px auto;
            }
        
            .card-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(0deg, rgba(0,71,133,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
                z-index: 1;
            }
        
            .card-content {
                position: relative;
                z-index: 2;
                padding: 30px;
                text-align: center;
                color: white;
                width: 100%;
            }
        
            .escudo {
                width: 70px;
                margin-bottom: 15px;
                filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.5));
            }
        
            .card-content h2 {
                font-size: 24px;
                font-weight: 800;
                margin-bottom: 10px;
                text-transform: uppercase;
                color: #fff;
            }
        
            .card-content p {
                font-size: 16px;
                line-height: 1.4;
                margin-bottom: 25px;
                opacity: 0.9;
            }
        
            .btn-socio {
                display: inline-block;
                padding: 12px 30px;
                background-color: #00ADEF; /* Azul Celeste */
                color: #fff;
                text-decoration: none;
                font-weight: bold;
                border-radius: 50px;
                transition: all 0.3s ease;
                border: 2px solid transparent;
                box-shadow: 0 4px 15px rgba(0, 173, 239, 0.4);
            }
        
            .btn-socio:hover {
                background-color: #fff;
                color: #004785; /* Azul Escuro */
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
            }
        </style>
    </main>

</body>
</html>
